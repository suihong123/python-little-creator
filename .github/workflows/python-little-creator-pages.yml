name: Deploy Python Little Creator

on:
  push:
    branches: [main]
    paths:
      - 'python-little-creator/**'
      - '.github/workflows/python-little-creator-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: python-little-creator-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-little-creator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: python-little-creator/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: VITE_BASE_PATH="/${GITHUB_REPOSITORY#*/}/" npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: python-little-creator/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
